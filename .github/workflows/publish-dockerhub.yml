name: Analyzer Service | Docker Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Docker image tag to publish
        required: false
        default: latest
        type: string

concurrency:
  group: reports-docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKERHUB_USERNAME: igortessaro
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  DOCKERHUB_REPOSITORY_NAME: fiap-soat-hackaton-reports-service-api
  IMAGE_TAG: ${{ inputs.tag }}

jobs:
  docker_api_publish:
    name: Reports API | Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push Reports Service Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY_NAME }}:${{ env.IMAGE_TAG }}